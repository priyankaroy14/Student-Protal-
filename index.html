<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Advanced Glow Form</title>

<style>
body {
    background: radial-gradient(circle at center, #101425 0%, #05070a 100%);
    color: #e0e6ed;
    font-family: 'Segoe UI', sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    margin: 0;
}

.container {
    width: 100%;
    max-width: 550px;
    padding: 35px;
    background: rgba(255,255,255,0.03);
    border-radius: 20px;
    backdrop-filter: blur(10px);
}

h1 {
    color: #00d4ff;
    margin-bottom: 10px;
}

.section-title {
    margin-top: 25px;
    font-size: 0.9rem;
    color: #64ffda;
}

.row {
    display: flex;
    gap: 15px;
}

.field {
    flex: 1;
    margin-bottom: 15px;
}

input, select {
    width: 100%;
    padding: 12px;
    border-radius: 10px;
    border: 1px solid #334155;
    background: rgba(0,0,0,0.3);
    color: white;
}

button {
    width: 100%;
    padding: 14px;
    background: linear-gradient(135deg, #00d4ff, #0072ff);
    border: none;
    border-radius: 10px;
    color: white;
    font-weight: bold;
    cursor: pointer;
    margin-top: 10px;
}

.dashboard {
    display: none;
    text-align: left;
}
</style>
</head>

<body>

<div class="container" id="formBox">

<h1>Personal Details</h1>

<form id="form">

<div class="section-title">Basic Info</div>
<div class="row">
    <input class="field" id="firstName" placeholder="First Name" required>
    <input class="field" id="lastName" placeholder="Last Name" required>
</div>

<div class="row">
    <input class="field" type="date" id="dob" required>
    <select class="field" id="gender">
        <option value="">Gender</option>
        <option>Male</option>
        <option>Female</option>
        <option>Other</option>
    </select>
</div>

<div class="section-title">Contact</div>
<input class="field" type="email" id="email" placeholder="Email" required>
<input class="field" type="tel" id="phone" placeholder="Phone Number">

<div class="section-title">Address</div>
<input class="field" id="city" placeholder="City">
<input class="field" id="country" placeholder="Country">

<div class="section-title">Security</div>
<input class="field" type="password" id="password" placeholder="Password" required>

<button type="submit">Continue →</button>

</form>
</div>

<!-- DASHBOARD -->
<div class="container dashboard" id="dashboard">
    <h1>Dashboard 🎉</h1>
    <div id="output"></div>
</div>

<script>
document.getElementById("form").addEventListener("submit", function(e){
    e.preventDefault();

    const data = {
        name: document.getElementById("firstName").value + " " + document.getElementById("lastName").value,
        dob: document.getElementById("dob").value,
        gender: document.getElementById("gender").value,
        email: document.getElementById("email").value,
        phone: document.getElementById("phone").value,
        city: document.getElementById("city").value,
        country: document.getElementById("country").value
    };

    document.getElementById("formBox").style.display = "none";
    document.getElementById("dashboard").style.display = "block";

    document.getElementById("output").innerHTML = `
        <p><b>Name:</b> ${data.name}</p>
        <p><b>DOB:</b> ${data.dob}</p>
        <p><b>Gender:</b> ${data.gender}</p>
        <p><b>Email:</b> ${data.email}</p>
        <p><b>Phone:</b> ${data.phone}</p>
        <p><b>City:</b> ${data.city}</p>
        <p><b>Country:</b> ${data.country}</p>
    `;
});
</script>

</body>
</html>
